window.migrate = async function(){
  var btn = document.getElementById('btn');
  var status = document.getElementById('status');
  btn.disabled = true;
  btn.textContent = '⏳ Actualizando...';
  status.innerHTML = '<span class="loading">Conectando con Firebase...</span>';

  try {
    // Step 1: Clear menu
    status.innerHTML = '<span class="loading">🗑️ Borrando menú anterior...</span>';
    await set(ref(db,'menu'), null);
    
    // Step 2: Upload all products
    status.innerHTML = '<span class="loading">📤 Cargando ' + DEFAULT_MENU.length + ' productos...</span>';
    var batch = {};
    DEFAULT_MENU.forEach(function(item){
      var newKey = push(ref(db,'menu')).key;
      batch[newKey] = item;
    });
    
    // Upload in chunks of 50
    var keys = Object.keys(batch);
    var total = keys.length;
    var done = 0;
    
    for(var i = 0; i < keys.length; i += 50){
      var chunk = {};
      keys.slice(i, i+50).forEach(function(k){ chunk[k] = batch[k]; });
      var chunkData = {};
      Object.entries(chunk).forEach(function(e){ chunkData['menu/'+e[0]] = e[1]; });
      
      // Use set for each chunk
      for(var [k,v] of Object.entries(chunk)){
        await set(ref(db,'menu/'+k), v);
        done++;
      }
      status.innerHTML = '<span class="loading">📤 Cargando productos... ' + done + '/' + total + '</span>';
    }
    
    status.innerHTML = '<span class="ok">✅ ¡Listo! ' + total + ' productos cargados correctamente.<br><br>Ya puedes cerrar esta página.</span>';
    btn.textContent = '✅ Completado';
    
  } catch(e) {
    status.innerHTML = '<span class="err">❌ Error: ' + e.message + '</span>';
    btn.disabled = false;
    btn.textContent = '🔄 Intentar de nuevo';
  }
};
</script>
