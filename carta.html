<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0e0c;--a:#e8521a;--a2:#f5a623;--g:#4caf72;--t:#f0ede8;--m:#7a7670;--s:#1a1916;--s2:#242220;--b:#2e2c29;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--t);min-height:100vh;-webkit-overflow-scrolling:touch;overflow-y:auto;overflow-x:hidden;}
#splash{position:fixed;inset:0;z-index:500;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;transition:opacity .5s;}
#splash.hide{opacity:0;pointer-events:none;}
.sl{font-size:4rem;margin-bottom:16px;animation:bounce 1s ease infinite alternate;}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-10px)}}
.st{font-family:"Syne",sans-serif;font-size:2.5rem;font-weight:900;letter-spacing:-1px;line-height:1;}
.st em{color:var(--a);font-style:normal;}
.ss{color:var(--m);font-size:.85rem;margin-top:8px;margin-bottom:32px;line-height:1.5;}
.sb{padding:17px 44px;background:var(--a);color:#fff;border:none;border-radius:14px;font-family:"Syne",sans-serif;font-size:1.05rem;font-weight:800;cursor:pointer;box-shadow:0 10px 30px rgba(232,82,26,.4);}
.sw{margin-top:14px;display:flex;align-items:center;gap:6px;color:var(--m);font-size:.78rem;text-decoration:none;justify-content:center;}
#main{display:none;padding-bottom:40px;}
#main.show{display:block;}
.hdr{position:sticky;top:0;z-index:100;background:rgba(15,14,12,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--b);}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:11px 16px 10px;}
.hdr-logo{font-family:"Syne",sans-serif;font-weight:900;font-size:.95rem;color:var(--a);}
.hdr-logo small{display:block;font-size:.57rem;color:var(--m);font-family:"DM Sans",sans-serif;font-weight:400;}
.hdr-wa{display:flex;align-items:center;gap:5px;background:#25D366;color:#fff;border:none;border-radius:9px;padding:7px 13px;font-size:.74rem;font-weight:700;cursor:pointer;font-family:"DM Sans",sans-serif;text-decoration:none;}
.back-btn{display:none;padding:12px 16px;background:var(--s);border:none;border-bottom:1px solid var(--b);color:var(--a);font-size:.88rem;font-weight:700;cursor:pointer;font-family:"DM Sans",sans-serif;width:100%;text-align:left;position:sticky;top:52px;z-index:10;}
.back-btn.show{display:block;}
.cats-toggle{display:flex;align-items:center;justify-content:center;gap:10px;padding:16px 16px;background:var(--bg);border:none;color:var(--t);font-size:1.1rem;font-weight:700;cursor:pointer;font-family:"Syne",sans-serif;width:100%;border-bottom:1px solid var(--b);transition:all .2s;position:relative;z-index:10;}
.cats-toggle:active{background:var(--s2);}
.cats-toggle .toggle-cat-img{width:32px;height:32px;border-radius:8px;object-fit:cover;}
.cats-toggle .toggle-cat-emoji{font-size:1.5rem;}
.cats-toggle svg{transition:transform .3s ease;flex-shrink:0;}
.cats-toggle.collapsed svg{transform:rotate(180deg);}
.cats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 16px;border-bottom:1px solid var(--b);background:var(--bg);position:relative;z-index:10;}
.cat-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:16px 8px;background:var(--s);border:1px solid var(--b);border-radius:14px;cursor:pointer;transition:all .2s ease;-webkit-tap-highlight-color:transparent;overflow:hidden;position:relative;}
.cat-btn:active{transform:scale(0.96);}
.cat-btn .cat-img{width:52px;height:52px;border-radius:10px;object-fit:cover;transition:transform .2s ease;}
.cat-btn .cat-emoji{font-size:2.2rem;line-height:1;transition:transform .2s ease;}
.cat-btn .cat-name{font-size:.82rem;font-weight:600;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;text-align:center;}
.cat-btn.on{background:rgba(232,82,26,.12);border-color:rgba(232,82,26,.5);}
.cat-btn.on .cat-name{color:var(--a);}
.cat-btn.on .cat-img,.cat-btn.on .cat-emoji{transform:scale(1.1);}
#promo-area{margin:12px 16px 0;}
.pb{background:linear-gradient(135deg,rgba(232,82,26,.14),rgba(245,166,35,.07));border:1px solid rgba(232,82,26,.3);border-radius:14px;padding:14px 16px;cursor:pointer;position:relative;overflow:hidden;}
.pb-lbl{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--a);margin-bottom:4px;}
.pb-title{font-family:"Syne",sans-serif;font-size:1rem;font-weight:800;margin-bottom:2px;}
.pb-msg{font-size:.76rem;color:var(--m);}
.pb-disc{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-family:"Syne",sans-serif;font-size:1.7rem;font-weight:900;color:var(--a);line-height:1;}
.pb-disc small{font-size:.7rem;display:block;text-align:center;}
#plato-area{margin:10px 16px 0;}
.plato{background:linear-gradient(135deg,#1c1008,#2d1a06);border:1px solid rgba(245,166,35,.3);border-radius:16px;padding:16px;position:relative;cursor:pointer;}
.plato-badge{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--a2);margin-bottom:5px;}
.plato-name{font-family:"Syne",sans-serif;font-size:1.1rem;font-weight:800;margin-bottom:3px;}
.plato-desc{font-size:.76rem;color:var(--m);margin-bottom:8px;}
.plato-prices{display:flex;align-items:baseline;gap:8px;}
.plato-old{font-size:.88rem;color:var(--m);text-decoration:line-through;}
.plato-new{font-family:"Syne",sans-serif;font-size:1.35rem;font-weight:900;color:var(--g);}
.plato-save{background:rgba(76,175,114,.15);border:1px solid rgba(76,175,114,.3);color:var(--g);font-size:.63rem;font-weight:700;padding:2px 8px;border-radius:99px;}
.cat-hero{position:relative;height:150px;margin:12px 16px 0;border-radius:16px;overflow:hidden;background:var(--s);}
.ch-img{width:100%;height:100%;object-fit:cover;}
.ch-emoji{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:4.5rem;background:linear-gradient(135deg,var(--s),var(--s2));}
.ch-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.72) 0%,transparent 55%);}
.ch-label{position:absolute;bottom:12px;left:16px;}
.ch-name{font-family:"Syne",sans-serif;font-size:1.4rem;font-weight:900;}
.ch-count{font-size:.7rem;color:rgba(255,255,255,.55);margin-top:1px;}
.prod-list{padding:10px 16px;}
.pi{background:var(--s);border:1px solid var(--b);border-radius:14px;margin-bottom:9px;overflow:hidden;cursor:pointer;display:flex;align-items:stretch;}
.pi.disc{border-color:rgba(232,82,26,.35);}
.pi-emoji{width:78px;min-height:78px;display:flex;align-items:center;justify-content:center;font-size:1.9rem;background:var(--s2);flex-shrink:0;}
.pi-body{flex:1;padding:11px 13px;display:flex;flex-direction:column;justify-content:center;}
.pi-name{font-weight:600;font-size:.9rem;line-height:1.2;margin-bottom:2px;}
.pi-desc{font-size:.7rem;color:var(--m);line-height:1.35;margin-bottom:7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.pi-foot{display:flex;align-items:center;justify-content:space-between;}
.pi-price{font-family:"Syne",sans-serif;font-size:.97rem;font-weight:800;color:var(--a2);}
.pi-old{font-size:.68rem;color:var(--m);text-decoration:line-through;margin-right:3px;}
.pi-tag{background:var(--a);color:#fff;font-size:.56rem;font-weight:700;padding:2px 6px;border-radius:99px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s;}
.overlay.show{opacity:1;pointer-events:all;}
.sheet{background:var(--s);border-radius:22px 22px 0 0;width:100%;max-height:88vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);}
.overlay.show .sheet{transform:translateY(0);}
.sh{width:38px;height:4px;background:var(--b);border-radius:99px;margin:11px auto 0;}
.s-img{width:100%;height:200px;display:flex;align-items:center;justify-content:center;font-size:4.5rem;background:var(--s2);}
.s-body{padding:18px 18px 28px;}
.s-cat{font-size:.64rem;color:var(--m);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px;}
.s-name{font-family:"Syne",sans-serif;font-size:1.45rem;font-weight:900;margin-bottom:6px;}
.s-desc{font-size:.83rem;color:var(--m);line-height:1.55;margin-bottom:14px;}
.s-pr{display:flex;align-items:center;gap:9px;margin-bottom:18px;}
.s-price{font-family:"Syne",sans-serif;font-size:1.75rem;font-weight:900;color:var(--a2);}
.s-old{font-size:1rem;color:var(--m);text-decoration:line-through;}
.s-dtag{background:var(--a);color:#fff;font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:99px;}
.sz-sec{margin-bottom:16px;}
.sz-lbl{font-size:.68rem;color:var(--m);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;}
.sz-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(95px,1fr));gap:5px;}
.sz-btn{padding:8px 5px;border-radius:9px;border:1px solid var(--b);background:transparent;color:var(--t);font-size:.76rem;cursor:pointer;font-family:"DM Sans",sans-serif;text-align:center;}
.sz-btn.on{background:rgba(232,82,26,.14);border-color:var(--a);color:var(--a);}
.sz-p{display:block;font-family:"Syne",sans-serif;font-weight:700;font-size:.8rem;color:var(--a2);margin-top:1px;}
.s-wa{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:15px;background:#25D366;color:#fff;border:none;border-radius:13px;font-family:"Syne",sans-serif;font-size:.93rem;font-weight:800;cursor:pointer;text-decoration:none;}
.s-close{width:100%;padding:11px;background:transparent;border:1px solid var(--b);border-radius:11px;color:var(--m);font-size:.83rem;cursor:pointer;font-family:"DM Sans",sans-serif;margin-top:7px;}
.pop-ov{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .3s;}
.pop-ov.show{opacity:1;pointer-events:all;}
.pop-box{background:var(--s);border-radius:22px;max-width:420px;width:100%;overflow:hidden;transform:scale(.88);transition:transform .3s cubic-bezier(.32,.72,0,1);}
.pop-ov.show .pop-box{transform:scale(1);}
.pop-img{width:100%;height:240px;display:flex;align-items:center;justify-content:center;font-size:7rem;background:linear-gradient(135deg,#1a0f0a,#2d1208);}
.pop-body{padding:20px 20px 22px;}
.pop-badge{display:inline-block;background:var(--a);color:#fff;font-size:.6rem;font-weight:700;padding:3px 10px;border-radius:99px;text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px;}
.pop-title{font-family:"Syne",sans-serif;font-size:1.25rem;font-weight:900;margin-bottom:5px;}
.pop-msg{font-size:.8rem;color:var(--m);line-height:1.5;margin-bottom:12px;}
.pop-disc{font-family:"Syne",sans-serif;font-size:2.8rem;font-weight:900;color:var(--a);text-align:center;margin-bottom:12px;}
.pop-disc small{font-size:1.1rem;}
.pop-btn{width:100%;padding:13px;background:var(--a);color:#fff;border:none;border-radius:11px;font-family:"Syne",sans-serif;font-size:.93rem;font-weight:800;cursor:pointer;margin-bottom:7px;}
.pop-close{width:100%;padding:9px;background:transparent;border:1px solid var(--b);border-radius:11px;color:var(--m);font-size:.78rem;cursor:pointer;font-family:"DM Sans",sans-serif;}
</style>
</head>

function openCats(){catsExpanded=true;document.getElementById("cats-grid").style.display="grid";document.getElementById("back-btn").classList.remove("show");document.getElementById("prod-list").innerHTML="";document.getElementById("cat-hero").innerHTML="";document.getElementById("plato-area").style.display="none";document.getElementById("promo-area").style.display="none";window.scrollTo({top:0});}
function switchCat(cat){activeCat=cat;document.querySelectorAll(".cat-btn").forEach(function(b){b.classList.toggle("on",b.getAttribute("data-cat")===cat);});catsExpanded=false;document.getElementById("cats-grid").style.display="none";document.getElementById("back-btn").classList.add("show");document.getElementById("plato-area").style.display="";document.getElementById("promo-area").style.display="";renderHero();renderProds();window.scrollTo({top:0,behavior:"smooth"});}
function loadData(){waitDB(function(){window._onValue(window._ref(window._db,"menu"),function(snap){var d=snap.val();if(d&&Object.keys(d).length>0){MENU=Object.entries(d).map(function(e){return Object.assign({key:e[0]},e[1]);});}else{MENU=DEFAULT_MENU.map(function(item,i){return Object.assign({key:"local_"+i},item);});}renderAll();});window._onValue(window._ref(window._db,"promos"),function(snap){PROMOS=snap.val()||{};renderBanner();renderPlato();checkPop();});window._onValue(window._ref(window._db,"cat_imgs"),function(snap){CAT_IMGS=snap.val()||{};renderAll();});window._onValue(window._ref(window._db,"config/combo"),function(snap){var c=snap.val();if(c){if(c.price)COMBO_PRICE=c.price;if(c.desc)COMBO_DESC=c.desc;}},{onlyOnce:true});});}
function getCats(){var c=[];MENU.forEach(function(i){if(c.indexOf(i.cat)===-1)c.push(i.cat);});return c;}
function getEmoji(cat){var item=MENU.find(function(i){return i.cat===cat;});return item?item.e:'🍽️';}
function getPromo(key,cat){if(PROMOS["item_"+key]&&PROMOS["item_"+key].active)return PROMOS["item_"+key];if(PROMOS["cat_"+cat]&&PROMOS["cat_"+cat].active)return PROMOS["cat_"+cat];return null;}
function renderAll(){var cats=getCats();if(!activeCat&&cats.length)activeCat=cats[0];var grid=document.getElementById("cats-grid");grid.innerHTML=cats.map(function(c){var ci=CAT_IMGS[c];var hasImg=ci&&ci.url;var emoji=getEmoji(c);var imgPart=hasImg?"<img class='cat-img' src='"+ci.url+"' onerror=\"this.style.display='none';this.nextElementSibling.style.display='block'\" alt='"+c+"'><span class='cat-emoji' style='display:none;'>"+emoji+"</span>":"<span class='cat-emoji'>"+emoji+"</span>";return "<button class='cat-btn"+(c===activeCat?" on":"")+"' data-cat='"+c+"'>"+imgPart+"<span class='cat-name'>"+c+"</span></button>";}).join("");grid.onclick=function(e){var btn=e.target.closest("[data-cat]");if(btn)switchCat(btn.getAttribute("data-cat"));};renderHero();renderProds();}
function renderHero(){var el=document.getElementById("cat-hero");if(!el)return;var ci=CAT_IMGS[activeCat];var count=MENU.filter(function(i){return i.cat===activeCat;}).length;var emoji=(ci&&ci.emoji)?ci.emoji:(MENU.find(function(i){return i.cat===activeCat;})||{e:"🍽️"}).e;var hasImg=ci&&ci.url;var inner=hasImg?"<img class='ch-img' src='"+ci.url+"' onerror=\"this.style.display='none'\" alt='"+activeCat+"'>":"<div class='ch-emoji'>"+emoji+"</div>";el.innerHTML="<div class='cat-hero'>"+inner+"<div class='ch-overlay'></div><div class='ch-label'><div class='ch-name'>"+activeCat+"</div><div class='ch-count'>"+count+" producto"+(count!==1?"s":"")+"</div></div></div>";}
function renderProds(){var items=MENU.filter(function(i){return i.cat===activeCat;});var list=document.getElementById("prod-list");var canCombo=COMBO_CATS.indexOf(activeCat)!==-1;list.innerHTML="";items.forEach(function(item){var pr=getPromo(item.key,item.cat);var fp=pr?Math.round(item.p*(1-pr.disc/100)):(item.p||0);var hasD=pr&&pr.disc>0;var div=document.createElement("div");div.className="pi"+(hasD?" disc":"");div.innerHTML="<div class='pi-body'><div class='pi-name'>"+item.n+"</div>"+(item.d?"<div class='pi-desc'>"+item.d+"</div>":"")+(canCombo?"<div style='font-size:.68rem;color:#f5a623;margin-bottom:4px;border:1px dashed rgba(245,166,35,.4);padding:3px 8px;border-radius:5px;display:inline-block;'>🍟 Disponible en combo +$"+COMBO_PRICE.toLocaleString("es-CO")+"</div>":"")+"<div class='pi-foot'><div class='pi-price'>"+(hasD?"<span class='pi-old'>"+fmt(item.p)+"</span>":"")+fmt(fp)+"</div>"+(hasD?"<span class='pi-tag'>-"+pr.disc+"%</span>":"")+"</div></div>";div.onclick=function(){openProd(item.key);};list.appendChild(div);});}
function renderBanner(){var b=PROMOS.banner;var el=document.getElementById("promo-area");if(b&&b.active){el.innerHTML="<div class='pb' onclick='showPop()'><div class='pb-lbl'>Promoción</div><div class='pb-title'>"+b.title+"</div><div class='pb-msg'>"+b.msg+"</div>"+(b.disc?"<div class='pb-disc'>"+b.disc+"<small>% OFF</small></div>":"")+"</div>";}else{el.innerHTML="";}}
function renderPlato(){var pl=PROMOS.plato;var el=document.getElementById("plato-area");if(pl&&pl.active){var save=pl.price&&pl.special?Math.round((pl.price-pl.special)/pl.price*100):0;el.innerHTML="<div class='plato' onclick='openPlatoPop()'><div class='plato-badge'>⭐ Plato del día</div><div style='font-size:2.2rem;margin-bottom:6px;'>"+pl.emoji+"</div><div class='plato-name'>"+pl.name+"</div>"+(pl.desc?"<div class='plato-desc'>"+pl.desc+"</div>":"")+"<div class='plato-prices'>"+(pl.price?"<span class='plato-old'>"+fmt(pl.price)+"</span>":"")+"<span class='plato-new'>"+fmt(pl.special)+"</span>"+(save>0?"<span class='plato-save'>-"+save+"%</span>":"")+"</div></div>";}else{el.innerHTML="";}}
function openProd(key){var item=MENU.find(function(i){return i.key===key;});if(!item)return;var pr=getPromo(item.key,item.cat);var fp=pr?Math.round(item.p*(1-pr.disc/100)):(item.p||0);var hasD=pr&&pr.disc>0;document.getElementById("s-img").textContent=item.e;document.getElementById("s-cat").textContent=item.cat;document.getElementById("s-name").textContent=item.n;document.getElementById("s-desc").textContent=item.d||"";var prHtml=hasD?"<span class='s-old'>"+fmt(item.p)+"</span><span class='s-price'>"+fmt(fp)+"</span><span class='s-dtag'>-"+pr.disc+"%</span>":"<span class='s-price'>"+fmt(fp)+"</span>";document.getElementById("s-pr").innerHTML=prHtml;var szEl=document.getElementById("s-sz");szEl.innerHTML="";if(item.sz&&Object.keys(item.sz).length){var szSec=document.createElement("div");szSec.className="sz-sec";var szLbl=document.createElement("div");szLbl.className="sz-lbl";szLbl.textContent="Tamaño";var szGrid=document.createElement("div");szGrid.className="sz-grid";Object.entries(item.sz).forEach(function(e){var szBtn=document.createElement("button");szBtn.className="sz-btn";szBtn.innerHTML=e[0]+"<span class='sz-p'>"+fmt(e[1])+"</span>";szBtn.addEventListener("click",function(){var grid=this.closest(".sz-grid");grid.querySelectorAll(".sz-btn").forEach(function(b){b.classList.remove("on");});this.classList.add("on");});szGrid.appendChild(szBtn);});szSec.appendChild(szLbl);szSec.appendChild(szGrid);szEl.appendChild(szSec);}var msg="Hola! Me interesa: "+item.n+(item.d?" - "+item.d:"");document.getElementById("s-wa").href="https://wa.me/573003585092?text="+encodeURIComponent(msg);document.getElementById("prod-ov").classList.add("show");}
function closeProd(){document.getElementById("prod-ov").classList.remove("show");}
document.getElementById("prod-ov").onclick=function(e){if(e.target===this)closeProd();};
function checkPop(){if(PROMOS.popup&&PROMOS.popup.active)setTimeout(showPop,1800);}
function showPop(){var p=PROMOS.popup||PROMOS.banner;if(!p||!p.active)return;document.getElementById("pop-badge").textContent=p.badge||"Promoción";document.getElementById("pop-title").textContent=p.title||"";document.getElementById("pop-msg").textContent=p.msg||"";var de=document.getElementById("pop-disc");de.innerHTML=p.disc?p.disc+"<small>% OFF</small>":"";var pi=document.getElementById("pop-img");pi.innerHTML=p.imgUrl?"<img src='"+p.imgUrl+"' style='width:100%;height:100%;object-fit:cover;' onerror='this.remove()'><div style='font-size:6rem;'>"+(p.emoji||"🎉")+"</div>":"<div style='font-size:6rem;'>"+(p.emoji||"🎉")+"</div>";document.getElementById("pop-ov").classList.add("show");}
function openPlatoPop(){var pl=PROMOS.plato;if(!pl)return;document.getElementById("pop-badge").textContent="⭐ Plato del día";document.getElementById("pop-title").textContent=pl.name||"";document.getElementById("pop-msg").textContent=pl.desc||"";document.getElementById("pop-disc").innerHTML=pl.special?"<span style='font-size:1.7rem;color:var(--g)'>"+fmt(pl.special)+"</span>":"";document.getElementById("pop-img").innerHTML="<div style='font-size:7rem;'>"+pl.emoji+"</div>";document.getElementById("pop-ov").classList.add("show");}
function closePop(){document.getElementById("pop-ov").classList.remove("show");}
</script>
</body>
</html>
