<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Arturo's — Domiciliarios</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0e0c;--a:#e8521a;--a2:#f5a623;--g:#4caf72;--t:#f0ede8;--m:#7a7670;--s:#1a1916;--s2:#242220;--b:#2e2c29;--r:#e85555;--blue:#3b82f6;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;overflow-x:hidden;overflow-y:scroll;-webkit-overflow-scrolling:touch;}

/* Header */
.header{position:sticky;top:0;z-index:10;background:rgba(15,14,12,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--b);}
.header-top{padding:12px 18px;display:flex;align-items:center;justify-content:space-between;}
.header .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;color:var(--a);display:flex;align-items:center;gap:8px;}
.header .logo span{font-size:1.3rem;}

/* Tabs */
.tabs{display:flex;border-top:1px solid var(--b);}
.tab{flex:1;padding:11px 0;text-align:center;font-size:.82rem;font-weight:700;color:var(--m);cursor:pointer;position:relative;transition:color .2s;}
.tab.active{color:var(--a);}
.tab.active::after{content:'';position:absolute;bottom:0;left:15%;right:15%;height:2.5px;background:var(--a);border-radius:2px;}
.tab .badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:9px;font-size:.65rem;font-weight:700;color:#fff;margin-left:5px;vertical-align:middle;}
.badge-orange{background:var(--a);}
.badge-green{background:var(--g);}
.badge-gray{background:var(--m);}

/* Content */
.content{padding:16px;max-width:500px;margin:0 auto;padding-bottom:40px;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
.section-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--m);margin:14px 0 8px;display:flex;align-items:center;gap:6px;}
.empty{text-align:center;padding:30px 20px;color:var(--m);font-size:.85rem;}
.empty .big{font-size:2.5rem;margin-bottom:8px;}

/* Order card */
.ocard{background:var(--s);border:1px solid var(--b);border-radius:14px;padding:16px;margin-bottom:12px;}
.ocard-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.ocard-id{font-family:'Syne',sans-serif;font-weight:800;font-size:1.05rem;color:var(--a);}
.ocard-time{font-size:.68rem;color:var(--m);}
.ocard-row{display:flex;align-items:flex-start;gap:6px;font-size:.82rem;margin-bottom:5px;line-height:1.4;}
.ocard-row .val{font-weight:600;}
.ocard-items{font-size:.78rem;color:var(--t);margin:8px 0;padding:10px 12px;background:var(--s2);border-radius:10px;line-height:1.6;}
.ocard-items .item-line{display:flex;justify-content:space-between;}
.ocard-items .item-qty{color:var(--a);font-weight:700;margin-right:4px;}
.ocard-items .item-price{color:var(--m);font-size:.72rem;}
.ocard-total{display:flex;justify-content:space-between;font-size:.85rem;font-weight:700;padding-top:8px;border-top:1px solid var(--b);margin-top:8px;}
.ocard-total .amount{color:var(--a2);font-family:'Syne',sans-serif;}
.ocard-status{display:inline-flex;align-items:center;gap:5px;font-size:.72rem;font-weight:700;padding:4px 10px;border-radius:8px;}
.st-listo{background:rgba(59,130,246,.12);color:var(--blue);}
.st-encamino{background:rgba(232,82,26,.12);color:var(--a);animation:pulseText 1.5s infinite;}
@keyframes pulseText{0%,100%{opacity:1}50%{opacity:.6}}
.ocard-dom{font-size:.75rem;color:var(--g);font-weight:600;}

.ocard-actions{display:flex;gap:8px;margin-top:12px;}
.btn{padding:13px 16px;border-radius:10px;border:none;font-size:.88rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;flex:1;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn:active{transform:scale(.96);}
.btn-take{background:var(--blue);color:#fff;}
.btn-deliver{background:var(--g);color:#fff;}
.btn-call{background:var(--s2);color:var(--t);border:1px solid var(--b);flex:0 0 auto;padding:13px 14px;text-decoration:none;border-radius:10px;font-size:.88rem;}

/* Overlay */
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.78);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:20px;}
.overlay-box{background:var(--s);border:1px solid var(--b);border-radius:16px;padding:24px 20px;text-align:center;max-width:320px;width:92%;animation:popIn .3s ease;}
@keyframes popIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.overlay-box h3{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;margin-bottom:16px;}
.dom-opt{display:block;width:100%;padding:14px;margin-bottom:8px;background:var(--s2);border:1px solid var(--b);border-radius:12px;color:var(--t);font-size:.95rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.dom-opt:active{transform:scale(.97);background:rgba(232,82,26,.1);border-color:var(--a);}
.cancel-btn{padding:10px 24px;background:transparent;border:1px solid var(--b);border-radius:10px;color:var(--m);cursor:pointer;font-size:.82rem;font-family:'DM Sans',sans-serif;margin-top:4px;}

/* Confirm */
.confirm-ov{display:none;position:fixed;inset:0;z-index:250;background:rgba(0,0,0,.78);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:20px;}
.confirm-ov.show{display:flex;}
.confirm-box{background:var(--s);border:1px solid var(--b);border-radius:16px;padding:24px 20px;text-align:center;max-width:320px;width:92%;animation:popIn .3s ease;}
.confirm-box .ci{font-size:2.5rem;margin-bottom:10px;}
.confirm-box p{font-size:.9rem;line-height:1.5;margin-bottom:16px;color:var(--t);}
.confirm-box p small{display:block;font-size:.76rem;color:var(--m);margin-top:4px;}
.confirm-btns{display:flex;gap:8px;}
.confirm-btns button{flex:1;padding:12px;border-radius:10px;border:none;font-size:.85rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;}
.cbtn-yes{color:#fff;}
.cbtn-no{background:transparent;border:1px solid var(--b) !important;color:var(--m);}

/* Alert */
.new-alert{display:none;position:fixed;top:90px;left:50%;transform:translateX(-50%);background:var(--a);color:#fff;padding:10px 20px;border-radius:10px;font-size:.85rem;font-weight:700;z-index:50;animation:slideDown .4s ease;box-shadow:0 4px 20px rgba(232,82,26,.4);}
.new-alert.show{display:block;}
@keyframes slideDown{from{transform:translateX(-50%) translateY(-100%);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}

.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--s2);border:1px solid var(--b);border-radius:9px;padding:9px 15px;font-size:.8rem;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo"><span>🏍️</span> Domicilios Arturo's</div>
  </div>
  <div class="tabs">
    <div class="tab active" id="tab-disp" onclick="switchTab('disp')">📦 Disponibles <span class="badge badge-orange" id="badge-disp">0</span></div>
    <div class="tab" id="tab-mis" onclick="switchTab('mis')">🛵 Mis entregas <span class="badge badge-green" id="badge-mis">0</span></div>
  </div>
</div>

<div class="new-alert" id="new-alert">🔔 ¡Nuevo pedido!</div>

<div class="content">
  <!-- Tab 1: Disponibles -->
  <div class="tab-panel active" id="panel-disp">
    <div id="list-listos"><div class="empty"><div class="big">⏳</div>Cargando...</div></div>
  </div>

  <!-- Tab 2: Mis entregas -->
  <div class="tab-panel" id="panel-mis">
    <div class="section-label">🛵 En camino</div>
    <div id="list-encamino"><div class="empty"><div class="big">🛵</div>Ninguno en camino</div></div>
    <div class="section-label">✅ Entregados hoy</div>
    <div id="list-done"><div class="empty"><div class="big">📋</div>Sin entregas hoy</div></div>
  </div>
</div>

<div id="name-overlay" style="display:none;"></div>

<div class="confirm-ov" id="confirm-ov">
  <div class="confirm-box">
    <div class="ci" id="confirm-icon">📦</div>
    <p id="confirm-msg">¿Confirmar?</p>
    <div class="confirm-btns">
      <button class="cbtn-no" onclick="closeConfirm()">Cancelar</button>
      <button class="cbtn-yes" id="confirm-yes">Sí</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getDatabase, ref, onValue, update, get } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

const app = initializeApp({databaseURL:'https://arturos-fast-food-default-rtdb.firebaseio.com'});
const db = getDatabase(app);

var allOrders = {};
var prevListoCount = -1;
var DOMS = [];
var currentTab = 'disp';

function fmt(n){ return '$'+(n||0).toLocaleString('es-CO'); }
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.className='toast show';clearTimeout(t._t);t._t=setTimeout(function(){t.className='toast';},2600);}
function timeAgo(ts){if(!ts)return '';var m=Math.floor((Date.now()-ts)/60000);if(m<1)return 'ahora';if(m<60)return 'hace '+m+' min';return 'hace '+Math.floor(m/60)+'h';}

function playAlert(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,0.12,0.24].forEach(function(d,i){
      var o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';o.frequency.value=[660,880,1100][i];
      g.gain.setValueAtTime(0.3,ctx.currentTime+d);
      g.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+d+0.3);
      o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+0.3);
    });
    if(navigator.vibrate)navigator.vibrate([150,80,150]);
  }catch(e){}
}

// ── Tabs ──
window.switchTab=function(tab){
  currentTab=tab;
  document.getElementById('tab-disp').classList.toggle('active',tab==='disp');
  document.getElementById('tab-mis').classList.toggle('active',tab==='mis');
  document.getElementById('panel-disp').classList.toggle('active',tab==='disp');
  document.getElementById('panel-mis').classList.toggle('active',tab==='mis');
};

// ── Load doms ──
onValue(ref(db,'config/doms'),function(snap){
  var saved=snap.val();
  if(saved)DOMS=Object.values(saved).filter(function(d){return d.on!==false;});
},{onlyOnce:true});

// ── Orders (real-time) ──
onValue(ref(db,'pedidos'),function(snap){
  allOrders=snap.val()||{};
  renderOrders();
});

function renderOrders(){
  var listos=[],encamino=[],done=[];
  var todayStart=new Date();todayStart.setHours(0,0,0,0);

  Object.keys(allOrders).forEach(function(key){
    var o=allOrders[key];
    if(!o)return;
    o._key=key;
    if(o.st==='listo'&&!o.dom) listos.push(o);
    else if(o.st==='en_camino') encamino.push(o);
    else if(o.st==='enviado'&&o.t&&o.t>=todayStart.getTime()) done.push(o);
  });

  listos.sort(function(a,b){return (a.t||0)-(b.t||0);});
  encamino.sort(function(a,b){return (b.t||0)-(a.t||0);});
  done.sort(function(a,b){return (b.t||0)-(a.t||0);});

  // Alert
  if(prevListoCount>=0&&listos.length>prevListoCount){
    playAlert();
    var na=document.getElementById('new-alert');
    na.classList.add('show');
    clearTimeout(na._t);
    na._t=setTimeout(function(){na.classList.remove('show');},4000);
  }
  prevListoCount=listos.length;

  // Badges
  document.getElementById('badge-disp').textContent=listos.length;
  document.getElementById('badge-mis').textContent=encamino.length;

  // Tab 1: Disponibles
  document.getElementById('list-listos').innerHTML=listos.length
    ?listos.map(function(o){return cardHTML(o,'listo');}).join('')
    :'<div class="empty"><div class="big">📭</div>No hay pedidos disponibles<br><small style="color:var(--m);">Cuando haya pedidos listos aparecerán aquí</small></div>';

  // Tab 2: Mis entregas
  document.getElementById('list-encamino').innerHTML=encamino.length
    ?encamino.map(function(o){return cardHTML(o,'en_camino');}).join('')
    :'<div class="empty"><div class="big">🛵</div>Ninguno en camino</div>';

  document.getElementById('list-done').innerHTML=done.length
    ?done.map(function(o){return cardHTML(o,'enviado');}).join('')
    :'<div class="empty"><div class="big">📋</div>Sin entregas hoy</div>';
}

function cardHTML(o,st){
  var cl=o.cl||o.client||'Cliente';
  var addr=o.addr||o.address||'';
  var barrio=o.barrio||'';
  var ph=o.ph||'';
  var pay=o.pay||'—';
  var tipo=o.tipo||'Domicilio';
  var items=o.items||[];
  var sub=items.reduce(function(s,i){return s+((i.precio||0)*(i.qty||1));},0);

  var itemsHTML=items.map(function(i){
    var note=i.note?'<div style="font-size:.68rem;color:var(--a);padding-left:22px;">📝 '+i.note+'</div>':'';
    return '<div class="item-line"><span><span class="item-qty">'+(i.qty||1)+'x</span> '+(i.nombre||i.name||'?')+(i.ss?' <span style="color:var(--m);">('+i.ss+')</span>':'')+'</span><span class="item-price">'+fmt((i.precio||0)*(i.qty||1))+'</span></div>'+note;
  }).join('');

  var statusHTML='';
  if(st==='listo')statusHTML='<span class="ocard-status st-listo">📦 Listo</span>';
  if(st==='en_camino')statusHTML='<span class="ocard-status st-encamino">🛵 En camino</span>';
  if(st==='enviado')statusHTML='<span class="ocard-status" style="background:rgba(76,175,114,.12);color:var(--g);">✅ Entregado</span>';

  var actionsHTML='';
  if(st==='listo'){
    actionsHTML='<div class="ocard-actions">'
      +'<button class="btn btn-take" onclick="showNamePicker(\''+o._key+'\')">🙋 Yo lo llevo</button>'
      +'</div>';
  }else if(st==='en_camino'){
    actionsHTML='<div class="ocard-actions">'
      +'<button class="btn btn-deliver" onclick="askEntregado(\''+o._key+'\')">✅ Entregado</button>'
      +(ph?'<a class="btn btn-call" href="tel:'+ph+'">📞</a>':'')
      +'</div>';
  }

  return '<div class="ocard">'
    +'<div class="ocard-header"><span class="ocard-id">'+(o.id||'#?')+'</span><span class="ocard-time">'+timeAgo(o.t)+'</span></div>'
    +'<div class="ocard-row"><span>👤</span> <span class="val">'+cl+'</span></div>'
    +'<div class="ocard-row"><span>📍</span> <span class="val">'+addr+(barrio?' · '+barrio:'')+'</span></div>'
    +(ph?'<div class="ocard-row"><span>📞</span> <span class="val">'+ph+'</span></div>':'')
    +'<div class="ocard-row"><span>💳</span> <span class="val">'+pay+'</span></div>'
    +'<div class="ocard-row"><span>🛵</span> <span class="val">'+tipo+'</span></div>'
    +'<div class="ocard-items">'+itemsHTML+'</div>'
    +'<div class="ocard-total"><span>Total</span><span class="amount">'+fmt(sub)+'</span></div>'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">'+statusHTML
    +(o.dom?'<span class="ocard-dom">🏍️ '+o.dom+'</span>':'')
    +'</div>'
    +actionsHTML
    +'</div>';
}

// ── Name picker ──
window.showNamePicker=function(key){
  if(!DOMS.length){toast('No hay domiciliarios configurados');return;}
  var o=allOrders[key];
  var ov=document.getElementById('name-overlay');
  ov.innerHTML='<div class="overlay"><div class="overlay-box">'
    +'<h3>🏍️ ¿Quién lleva el '+(o?o.id:'pedido')+'?</h3>'
    +DOMS.map(function(d){
      return '<button class="dom-opt" onclick="doTake(\''+key+'\',\''+d.name.replace(/'/g,"\\'")+'\','+d.id+')">🏍️ '+d.name+'</button>';
    }).join('')
    +'<button class="cancel-btn" onclick="closeNamePicker()">Cancelar</button>'
    +'</div></div>';
  ov.style.display='block';
};

window.closeNamePicker=function(){
  document.getElementById('name-overlay').style.display='none';
};

window.doTake=function(key,name,domId){
  document.getElementById('name-overlay').style.display='none';
  update(ref(db,'pedidos/'+key),{st:'en_camino',dom:name,tEnCamino:Date.now()});
  toast('🛵 '+name+' lleva el pedido');
  // Cambiar a pestaña Mis entregas
  switchTab('mis');
};

// ── Entregado ──
var pendingAction=null;

window.askEntregado=function(key){
  var o=allOrders[key];
  pendingAction=function(){doEntregado(key,o?o.dom:'');};
  document.getElementById('confirm-icon').textContent='📦';
  document.getElementById('confirm-msg').innerHTML='¿Confirmar entrega de <b>'+(o?o.id:'')+'</b>?';
  document.getElementById('confirm-yes').textContent='Sí, entregado';
  document.getElementById('confirm-yes').style.background='var(--g)';
  document.getElementById('confirm-ov').classList.add('show');
};

window.closeConfirm=function(){
  document.getElementById('confirm-ov').classList.remove('show');
  pendingAction=null;
};

document.getElementById('confirm-yes').addEventListener('click',function(){
  document.getElementById('confirm-ov').classList.remove('show');
  if(pendingAction)pendingAction();
  pendingAction=null;
});

function doEntregado(key,domName){
  update(ref(db,'pedidos/'+key),{st:'enviado',tEntregado:Date.now()});
  if(domName){
    var dom=DOMS.find(function(d){return d.name===domName;});
    if(dom){
      var statsRef=ref(db,'config/domStats/'+dom.id);
      get(statsRef).then(function(snap){
        var stats=snap.val()||{pd:0,ing:0};
        update(statsRef,{pd:(stats.pd||0)+1,ing:(stats.ing||0)+8000});
      }).catch(function(){});
    }
  }
  toast('✅ ¡Entregado!');
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(function(regs){
    regs.forEach(function(r){r.unregister();});
  });
}
</script>
</body>
</html>
